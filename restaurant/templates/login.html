<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Spicy Garden</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --surface-color: rgba(30, 41, 59, 0.7);
            --surface-border: rgba(255, 255, 255, 0.1);
            --primary-accent: #3b82f6;
            --primary-hover: #2563eb;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --danger: #ef4444;
            --success: #10b981;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.2) 0px, transparent 60%),
                radial-gradient(at 100% 100%, rgba(139, 92, 246, 0.2) 0px, transparent 60%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .auth-container {
            width: 100%;
            max-width: 450px;
            padding: 2rem;
            animation: fadeInUp 0.8s ease-out;
        }

        .auth-card {
            background: var(--surface-color);
            border: 1px solid var(--surface-border);
            border-radius: 20px;
            padding: 3rem 2.5rem;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .brand-icon {
            font-size: 3.5rem;
            color: var(--primary-accent);
            margin-bottom: 1rem;
        }

        h2 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: var(--text-muted);
            margin-bottom: 2rem;
            font-size: 0.95rem;
        }

        .input-group {
            position: relative;
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .input-group ion-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 1.2rem;
        }

        .input-group input {
            width: 100%;
            padding: 1rem 1rem 1rem 3rem;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--surface-border);
            border-radius: 12px;
            color: var(--text-main);
            font-size: 1rem;
            transition: all 0.3s ease;
            outline: none;
        }

        .input-group input:focus {
            border-color: var(--primary-accent);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
            background: rgba(15, 23, 42, 0.8);
        }

        .input-group input::placeholder {
            color: rgba(148, 163, 184, 0.6);
        }

        .submit-btn {
            width: 100%;
            padding: 1rem;
            background: var(--primary-accent);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 0.5rem;
        }

        .submit-btn:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
        }

        .link-text {
            color: var(--text-muted);
            margin-top: 1.5rem;
            font-size: 0.9rem;
            display: inline-block;
        }

        .link-text a {
            color: #a78bfa;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .link-text a:hover {
            color: #c4b5fd;
            text-decoration: underline;
        }

        /* Toast Notifications */
        .toast-container {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            z-index: 1000;
        }
        .toast {
            background: rgba(30, 41, 59, 0.9);
            backdrop-filter: blur(8px);
            border-left: 4px solid var(--primary-accent);
            color: #fff;
            padding: 1rem 1.5rem;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            animation: slideInRight 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }
        .toast.error { border-left-color: var(--danger); }
        .toast.success { border-left-color: var(--success); }
        
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes slideInRight { from { opacity: 0; transform: translateX(100%); } to { opacity: 1; transform: translateX(0); } }
        @keyframes fadeOut { to { opacity: 0; } }
    </style>
</head>
<body>

    {% if messages %}
    <div class="toast-container">
        {% for message in messages %}
        <div class="toast {% if message.tags %}{{ message.tags }}{% endif %}" id="toast-{{ forloop.counter }}">
            <ion-icon name="{% if message.tags == 'error' %}alert-circle{% else %}information-circle{% endif %}"></ion-icon>
            <span>{{ message }}</span>
        </div>
        <script>
            setTimeout(() => {
                const toast = document.getElementById('toast-{{ forloop.counter }}');
                toast.style.animation = 'fadeOut 0.5s ease forwards';
                setTimeout(() => toast.remove(), 500);
            }, 5000);
        </script>
        {% endfor %}
    </div>
    {% endif %}

    <div class="auth-container">
        <div class="auth-card">
            <ion-icon name="restaurant" class="brand-icon"></ion-icon>
            <h2>Welcome Back</h2>
            <p class="subtitle">Please enter your details to sign in.</p>

            <form method="POST" id="loginForm">
                {% csrf_token %}
                <div class="input-group">
                    <ion-icon name="person-outline"></ion-icon>
                    <input type="text" name="username" id="username" placeholder="Username" required>
                </div>
                
                <div class="input-group">
                    <ion-icon name="lock-closed-outline"></ion-icon>
                    <input type="password" name="password" id="password" placeholder="Password" required>
                </div>
                
                <div style="text-align: right; margin-bottom: 1.5rem; margin-top: -0.5rem;">
                    <a href="{% url 'password_reset' %}" style="color: var(--text-muted); text-decoration: none; font-size: 0.9rem; transition: color 0.3s ease;" onmouseover="this.style.color='#c4b5fd'" onmouseout="this.style.color='var(--text-muted)'">Forgot Password?</a>
                </div>
                
                <button type="submit" class="submit-btn">Sign In</button>
            </form>

            <span class="link-text">Don't have an account? <a href="/register/">Sign up here</a></span>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            
            if (!username || !password) {
                e.preventDefault();
                showToast('Please fill in all fields', 'error');
            }
        });

        function showToast(message, type) {
            const container = document.querySelector('.toast-container') || document.createElement('div');
            if (!document.querySelector('.toast-container')) {
                container.className = 'toast-container';
                document.body.appendChild(container);
            }
            
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `
                <ion-icon name="${type === 'error' ? 'alert-circle' : 'information-circle'}"></ion-icon>
                <span>${message}</span>
            `;
            
            container.appendChild(toast);
            
            setTimeout(() => {
                toast.style.animation = 'fadeOut 0.5s ease forwards';
                setTimeout(() => toast.remove(), 500);
            }, 3000);
        }
    </script>

</body>
</html>
